name: PluginLock
version: 0.1.0
main: dev.noah.pluginlock.paper.PluginLockPaperPlugin
api-version: '1.21'
author: Noah
commands:
  pluginlock:
    description: Install plugins from server-lock.lock.json.
    usage: /pluginlock install
    permission: pluginlock.install
permissions:
  pluginlock.install:
    description: Allows installing plugins from the lockfile.
    default: op
